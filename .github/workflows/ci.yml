name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @flowweaver/backend exec prisma generate

      - name: Lint
        run: pnpm --filter @flowweaver/backend lint

      - name: Test
        run: pnpm --filter @flowweaver/backend test
        env:
          DATABASE_URL: "file:./test.db"
          JWT_SECRET: "ci-test-secret"
          SECRET_ENCRYPTION_KEY: "ci-test-enc-key-32-chars-paddddd"

      - name: Build backend
        run: pnpm --filter @flowweaver/backend build

      - name: Build frontend
        run: pnpm --filter @flowweaver/frontend build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3001"
